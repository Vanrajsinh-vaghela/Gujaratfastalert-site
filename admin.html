<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gujarat Fast Alert - Admin Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f3f4f6; padding: 20px; color: #333; }
        .admin-box { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #0d355a; margin-bottom: 20px; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; }
        input[type="text"], input[type="password"], textarea, select { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
        textarea { height: 250px; font-family: monospace; }
        .btn { background: #0088cc; color: white; border: none; padding: 12px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; }
        .btn:hover { background: #0077b3; }
        .btn-danger { background: #ea4335; margin-top: 10px; }
        .status { margin-top: 15px; padding: 10px; border-radius: 6px; font-weight: bold; display: none; }
        .success { background: #def7ec; color: #03543f; }
        .error { background: #fde8e8; color: #9b1c1c; }
        .row { display: flex; gap: 15px; }
        .row .form-group { flex: 1; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2>🚀 Gujarat Fast Alert - એડમિન પેનલ</h2>
    
    <!-- ગિટહબ કનેક્શન સેટિંગ્સ -->
    <div class="row">
        <div class="form-group">
            <label>GitHub Username / Repo Name</label>
            <input type="text" id="repo" placeholder="દા.ત. vanrajsinh/gujaratfastalert">
        </div>
        <div class="form-group">
            <label>GitHub Personal Access Token (PAT)</label>
            <input type="password" id="token" placeholder="તમારો ગુપ્ત ટોકન અહીં નાખો">
        </div>
    </div>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #e5e7eb;">

    <!-- ફાઈલ ઓપરેશન્સ -->
    <div class="form-group">
        <label>એક્શન પસંદ કરો</label>
        <select id="action-type" onchange="toggleMode()">
            <option value="edit">હાલની ફાઈલ એડિટ/ડીલીટ કરો (દા.ત. index.html)</option>
            <option value="create">નવી પોસ્ટ/પેજ બનાવો (.html)</option>
        </select>
    </div>

    <div class="form-group">
        <label>ફાઈલનું નામ (Filename with extension)</label>
        <input type="text" id="filename" placeholder="દા.ત. index.html કે navi-bharti.html">
    </div>

    <div class="form-group" id="fetch-section">
        <button type="button" class="btn" style="background:#111827;" onclick="fetchFileContent()">ફાઈલનો કોડ લોડ કરો 📥</button>
    </div>

    <div class="form-group">
        <label>ફાઈલનો કોડ / કન્ટેન્ટ (HTML Edit Area)</label>
        <textarea id="file-content" placeholder="અહીં તમારો કોડ દેખાશે અથવા નવો કોડ પેસ્ટ કરો..."></textarea>
    </div>

    <div id="status-msg" class="status"></div>

    <button type="button" class="btn" onclick="saveToGitHub()">ફાઈલ સેવ કરો (Publish) 💾</button>
    <button type="button" class="btn btn-danger" id="delete-btn" style="display:none;" onclick="deleteFileFromGitHub()">આ ફાઈલ ડીલીટ કરો 🗑️</button>
</div>

<script>
    let currentSha = "";

    function toggleMode() {
        const action = document.getElementById('action-type').value;
        const fetchSec = document.getElementById('fetch-section');
        const delBtn = document.getElementById('delete-btn');
        if(action === 'create') {
            fetchSec.style.display = 'none';
            delBtn.style.display = 'none';
            document.getElementById('file-content').value = "";
            currentSha = "";
        } else {
            fetchSec.style.display = 'block';
        }
    }

    // ૧. ગિટહબમાંથી ફાઈલનો કોડ ખેંચવા માટે
    async function fetchFileContent() {
        const repo = document.getElementById('repo').value;
        const token = document.getElementById('token').value;
        const filename = document.getElementById('filename').value;
        const statusMsg = document.getElementById('status-msg');

        if(!repo || !token || !filename) {
            showStatus("કૃપા કરીને બધી વિગતો ભરો!", "error");
            return;
        }

        showStatus("ફાઈલ લોડ થઈ રહી છે...", "success");

        try {
            const response = await fetch(`https://api.github.com/repos/${repo}/contents/${filename}`, {
                headers: { 'Authorization': `token ${token}` }
            });

            if(response.ok) {
                const data = await response.json();
                currentSha = data.sha;
                // Base64 કોડને નોર્મલ ટેક્સ્ટમાં બદલવા માટે
                document.getElementById('file-content').value = decodeURIComponent(escape(atob(data.content)));
                showStatus("ફાઈલ સફળતાપૂર્વક લોડ થઈ ગઈ છે!", "success");
                document.getElementById('delete-btn').style.display = 'block';
            } else {
                showStatus("ફાઈલ ન મળી! નામ બરાબર ચેક કરો.", "error");
            }
        } catch (err) {
            showStatus("કનેક્શનમાં ભૂલ આવી!", "error");
        }
    }

    // ૨. નવી ફાઈલ બનાવવા અથવા જૂની સેવ કરવા માટે
    async function saveToGitHub() {
        const repo = document.getElementById('repo').value;
        const token = document.getElementById('token').value;
        const filename = document.getElementById('filename').value;
        const content = document.getElementById('file-content').value;
        const action = document.getElementById('action-type').value;

        if(!repo || !token || !filename || !content) {
            showStatus("બધી વિગતો અને કન્ટેન્ટ જરૂરી છે!", "error");
            return;
        }

        showStatus("GitHub પર અપડેટ થઈ રહ્યું છે...", "success");

        // નોર્મલ ટેક્સ્ટને ગિટહબ માટે Base64 માં ફેરવવા
        const base64Content = btoa(unescape(encodeURIComponent(content)));
        
        const bodyData = {
            message: `Admin Panel: Updated ${filename}`,
            content: base64Content
        };

        if(action === 'edit' && currentSha) {
            bodyData.sha = currentSha;
        }

        try {
            const response = await fetch(`https://api.github.com/repos/${repo}/contents/${filename}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(bodyData)
            });

            if(response.ok) {
                const resData = await response.json();
                currentSha = resData.content.sha;
                showStatus("🎉 ફાઈલ સફળતાપૂર્વક લાઈવ પબ્લિશ થઈ ગઈ છે! હવે Cloudflare Cache સાફ કરી દેજો.", "success");
            } else {
                showStatus("સેવ કરવામાં ભૂલ આવી. ટોકન કે પરમિશન ચેક કરો.", "error");
            }
        } catch (err) {
            showStatus("સર્વર કનેક્શન પ્રોબ્લેમ!", "error");
        }
    }

    // ૩. ફાઈલ ડીલીટ કરવા માટે
    async function deleteFileFromGitHub() {
        if(!confirm("શું તમે ખરેખર આ ફાઈલ સાઇટ પરથી ડીલીટ કરવા માંગો છો?")) return;

        const repo = document.getElementById('repo').value;
        const token = document.getElementById('token').value;
        const filename = document.getElementById('filename').value;

        showStatus("ફાઈલ ડીલીટ થઈ રહી છે...", "error");

        try {
            const response = await fetch(`https://api.github.com/repos/${repo}/contents/${filename}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `Admin Panel: Deleted ${filename}`,
                    sha: currentSha
                })
            });

            if(response.ok) {
                showStatus("🗑️ ફાઈલ સાઇટ પરથી ડીલીટ થઈ ગઈ છે!", "success");
                document.getElementById('file-content').value = "";
                document.getElementById('filename').value = "";
                document.getElementById('delete-btn').style.display = 'none';
                currentSha = "";
            } else {
                showStatus("ડીલીટ ના થઈ શકી!", "error");
            }
        } catch (err) {
            showStatus("Error!", "error");
        }
    }

    function showStatus(msg, type) {
        const el = document.getElementById('status-msg');
        el.innerText = msg;
        el.className = `status ${type}`;
        el.style.display = 'block';
    }
</script>

</body>
</html>
