<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gujarat Fast Alert - Simple Form Admin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #f3f4f6; padding: 20px; color: #333; }
        .admin-box { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #0d355a; margin-bottom: 20px; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; }
        input[type="text"], input[type="password"], select { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
        .btn { background: #0d355a; color: white; border: none; padding: 12px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #1a4975; }
        .btn-success { background: #25D366; width: 100%; margin-top: 20px; font-size: 16px; }
        .btn-success:hover { background: #1ebd59; }
        .status { margin-top: 15px; padding: 10px; border-radius: 6px; font-weight: bold; display: none; text-align: center; }
        .success { background: #def7ec; color: #03543f; }
        .error { background: #fde8e8; color: #9b1c1c; }
        .row { display: flex; gap: 15px; margin-bottom: 15px; }
        .row .form-group { flex: 1; }
        .item-row { display: flex; gap: 10px; align-items: center; background: #f9fafb; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #e5e7eb; }
        .item-row input { flex: 1; }
        .item-row label { margin-bottom: 0; white-space: nowrap; }
        .list-section { margin-top: 25px; background: #ffffff; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .section-head { font-size: 16px; font-weight: bold; color: #2b6cb0; margin-bottom: 10px; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2>🚀 Live Link & Post Manager (Branch Protect Version)</h2>
    
    <!-- ગિટહબ લોગીન અને બ્રાન્ચ સેટીંગ -->
    <div class="row">
        <div class="form-group">
            <label>GitHub Username / Repo Name</label>
            <input type="text" id="repo" placeholder="દા.ત. vanrajsinh/gujaratfastalert">
        </div>
        <div class="form-group">
            <label>GitHub Personal Access Token (PAT)</label>
            <input type="password" id="token" placeholder="તમારો ગુપ્ત ghp_ ટોકન પેસ્ટ કરો">
        </div>
        <div class="form-group" style="flex: 0.5;">
            <label>Branch (બ્રાન્ચ)</label>
            <input type="text" id="branch" value="main" placeholder="main અથવા master">
        </div>
    </div>

    <button type="button" class="btn" onclick="loadHomepageData()">સાઇટનો લાઇવ કન્ટેન્ટ લોડ કરો 📥</button>
    <div id="status-msg" class="status"></div>

    <!-- લાઇવ ડેટા એડિટ ફોર્મ્સ -->
    <div id="editor-form" style="display: none;">
        
        <!-- ૧. સરકારી નોકરી લિસ્ટ -->
        <div class="list-section">
            <div class="section-head">🔥 લેટેસ્ટ સરકારી નોકરીઓ (Jobs List)</div>
            <div id="jobs-container"></div>
            <button type="button" class="btn" style="background:#4a5568; padding:6px 12px; margin-top:5px; font-size:12px;" onclick="addRow('jobs-container')">+ નવી લાઈન ઉમેરો</button>
        </div>

        <!-- ૨. આર્ટિકલ્સ લિસ્ટ -->
        <div class="list-section">
            <div class="section-head">📰 લેટેસ્ટ માહિતી અને આર્ટિકલ્સ (Articles List)</div>
            <div id="articles-container"></div>
            <button type="button" class="btn" style="background:#4a5568; padding:6px 12px; margin-top:5px; font-size:12px;" onclick="addRow('articles-container')">+ નવી લાઈન ઉમેરો</button>
        </div>

        <button type="button" class="btn btn-success" onclick="saveDataToGitHub()">ફેરફારો લાઇવ પબ્લિશ કરો 💾</button>
    </div>
</div>

<script>
    let originalHtmlContent = "";
    let fileSha = "";

    // સાઇટનો ડેટા ગિટહબમાંથી ખેંચીને ફોર્મ બનાવવું
    async function loadHomepageData() {
        const repo = document.getElementById('repo').value.trim();
        const token = document.getElementById('token').value.trim();
        const branch = document.getElementById('branch').value.trim();
        
        if(!repo || !token || !branch) { showStatus("કૃપા કરીને પહેલા Repo, Token અને Branch ભરો!", "error"); return; }

        showStatus("સાઇટ પરથી ડેટા લોડ થઈ રહ્યો છે...", "success");

        try {
            // બ્રાન્ચ પેરામીટર (?ref=) સાથે લિંક ડાયરેક્ટ હિટ કરવી
            const response = await fetch(`https://api.github.com/repos/${repo}/contents/index.html?ref=${branch}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            
            if(!response.ok) { 
                showStatus(`ફાઇલ ન મળી! કદાચ બ્રાન્ચ '${branch}' ખોટી છે. જો 'main' થી એરર આવે તો ત્યાં 'master' લખીને ટ્રાય કરો.`, "error"); 
                return; 
            }
            
            const data = await response.json();
            fileSha = data.sha;
            originalHtmlContent = decodeURIComponent(escape(atob(data.content)));

            // ડેટા પાર્સ કરીને ફોર્મમાં ભરવો
            parseAndFill('jobs', '<!--START_JOBS-->', '<!--END_JOBS-->', 'jobs-container');
            parseAndFill('articles', '<!--START_ARTICLES-->', '<!--END_ARTICLES-->', 'articles-container');

            document.getElementById('editor-form').style.display = 'block';
            showStatus("🎉 સફળતાપૂર્વક ડેટા લોડ થઈ ગયો છે! હવે તમે નીચે લિંક્સ બદલી શકો છો.", "success");
        } catch(e) {
            showStatus("ડેટા લોડ કરવામાં કોઈ ટેકનિકલ પ્રોબ્લેમ થયો!", "error");
        }
    }

    // HTML માંથી લિંક અને નામ જુદા પાડીને બોક્સ બનાવવા
    function parseAndFill(type, startMarker, endMarker, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        
        const parts = originalHtmlContent.split(startMarker);
        if(parts.length < 2) return;
        const subParts = parts[1].split(endMarker);
        const listHtml = subParts[0].trim();

        const div = document.createElement('div');
        div.innerHTML = listHtml;
        const links = div.getElementsByTagName('a');

        if(links.length === 0) {
            for(let i=0; i<3; i++) addRow(containerId);
            return;
        }

        for(let link of links) {
            const url = link.getAttribute('href') || '#';
            const textSpan = link.querySelector('.item-text');
            const title = textSpan ? textSpan.innerText.replace('📌 ', '').replace('💼 ', '') : link.innerText;
            const hasBadge = link.querySelector('.badge-new') ? true : false;
            addRow(containerId, title, url, hasBadge);
        }
    }

    // નવી ડાયરેક્ટ લિંકની રો ઉમેરવી
    function addRow(containerId, title="", url="", hasBadge=false) {
        const container = document.getElementById(containerId);
        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
            <input type="text" class="item-title" placeholder="લખાણ / Title (દા.ત. GSSSB નવી ભરતી)" value="${title}">
            <input type="text" class="item-url" placeholder="ડાયરેક્ટ લિંક / URL (દા.ત. /category/jobs.html)" value="${url}">
            <label><input type="checkbox" class="item-badge" ${hasBadge ? 'checked' : ''}> New Badge</label>
            <button type="button" style="background:none; border:none; color:red; cursor:pointer; font-weight:bold; margin-left:5px;" onclick="this.parentElement.remove()">✕</button>
        `;
        container.appendChild(row);
    }

    // બોક્સના ડેટામાંથી પાછો HTML કોડ બનાવીને ગિટહબ પર મોકલવો
    async function saveDataToGitHub() {
        const repo = document.getElementById('repo').value.trim();
        const token = document.getElementById('token').value.trim();
        const branch = document.getElementById('branch').value.trim();

        showStatus("તમારા ફેરફારો લાઇવ પબ્લિશ થઈ રહ્યા છે...", "success");

        const jobsHtml = generateHtmlFromContainer('jobs-container');
        const articlesHtml = generateHtmlFromContainer('articles-container');

        let updatedHtml = replaceBetween(originalHtmlContent, '<!--START_JOBS-->', '<!--END_JOBS-->', "\n" + jobsHtml + "\n            ");
        updatedHtml = replaceBetween(updatedHtml, '<!--START_ARTICLES-->', '<!--END_ARTICLES-->', "\n" + articlesHtml + "\n            ");

        const base64Content = btoa(unescape(encodeURIComponent(updatedHtml)));

        try {
            const response = await fetch(`https://api.github.com/repos/${repo}/contents/index.html`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Admin Panel: Updated Homepage Links",
                    content: base64Content,
                    sha: fileSha,
                    branch: branch
                })
            });

            if(response.ok) {
                const resData = await response.json();
                fileSha = resData.content.sha;
                originalHtmlContent = updatedHtml;
                showStatus("🎉 અભિનંદન! બધી લિંક્સ કોડિંગ વગર લાઇવ અપડેટ થઈ ગઈ છે. ક્લાઉડફ્લેર ક્લિયર કરી દો.", "success");
            } else {
                showStatus("સેવ કરવામાં એરર આવી! પરમિશન ચેક કરો.", "error");
            }
        } catch(e) {
            showStatus("ગિટહબ સર્વર કનેક્શન ફેલ!", "error");
        }
    }

    function generateHtmlFromContainer(containerId) {
        const container = document.getElementById(containerId);
        const rows = container.getElementsByClassName('item-row');
        let html = "";
        for(let row of rows) {
            const title = row.querySelector('.item-title').value.trim();
            const url = row.querySelector('.item-url').value.trim();
            const badge = row.querySelector('.item-badge').checked;
            
            if(!title) continue;
            
            if(badge) {
                html += `            <a href="${url || '#'}" class="list-item"><span class="item-text">📌 ${title}</span><span class="badge-new">New</span></a>\n`;
            } else {
                html += `            <a href="${url || '#'}" class="list-item"><span class="item-text">💼 ${title}</span><span class="arrow-icon">➔</span></a>\n`;
            }
        }
        return html.trim();
    }

    function replaceBetween(origin, start, end, insertion) {
        const parts = origin.split(start);
        const subParts = parts[1].split(end);
        return parts[0] + start + insertion + end + subParts[1];
    }

    function showStatus(msg, type) {
        const el = document.getElementById('status-msg');
        el.innerText = msg;
        el.className = `status ${type}`;
        el.style.display = 'block';
    }
</script>

</body>
</html>
