<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gujarat Fast Alert - Golden Pro Admin Panel</title>
    
    <!-- Tailwind CSS & Firebase SDK -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

    <style>
        :root {
            --bg-dark: #0b0f19;
            --card-dark: #131b2e;
            --card-border: #1e293b;
            --input-bg: #0f172a;
            --gold-start: #eab308;
            --gold-end: #ca8a04;
        }
        body { 
            background-color: var(--bg-dark); 
            color: #f1f5f9; 
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Premium Golden Button Style */
        .btn-gold {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 50%, #b45309 100%);
            color: #000000;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(217, 119, 6, 0.3);
            border: 1px solid #fef08a;
            transition: all 0.2s ease-in-out;
        }
        .btn-gold:hover {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #d97706 100%);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
        }
        .btn-gold:active {
            transform: translateY(1px);
        }

        .dark-card {
            background-color: var(--card-dark);
            border: 1px solid var(--card-border);
            border-radius: 16px;
        }

        .dark-input {
            background-color: var(--input-bg);
            border: 1px solid #334155;
            color: #f8fafc;
        }
        .dark-input:focus {
            outline: none;
            border-color: #f59e0b;
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #000000;
            font-weight: 800;
        }
    </style>
</head>

    <!-- CORE SCRIPT ENGINE -->
    <script>
        const MY_SECRET_PIN = "1465822"; 

        const firebaseConfig = {
            apiKey: "AIzaSyD40GV9eAeGiu-Tz0l09ZLifjzAQp3UFso",
            authDomain: "gujarat-fast-alert.firebaseapp.com",
            databaseURL: "https://gujarat-fast-alert-default-rtdb.firebaseio.com",
            projectId: "gujarat-fast-alert",
            storageBucket: "gujarat-fast-alert.firebasestorage.app",
            messagingSenderId: "395130500748",
            appId: "1:395130500748:web:e6589f3a57812efad6ada9",
            measurementId: "G-ZJN134J7EC"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function checkAdminPin() {
            if(document.getElementById('adminPinInput').value === MY_SECRET_PIN) {
                document.getElementById('pinScreen').style.display = 'none';
                document.getElementById('mainAdminBox').classList.remove('hidden');
                loadSavedGithubConfig();
                loadGlobalSettings(); 
                loadCategoryPosts();
            } else {
                alert("❌ Invalid Security PIN!");
                document.getElementById('adminPinInput').value = '';
            }
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(btn) btn.classList.add('active');
        }

        function toggleGithubConfig() {
            const block = document.getElementById('githubConfigBlock');
            block.classList.toggle('hidden');
        }

        function saveGithubConfig() {
            const repo = document.getElementById('ghRepo').value.trim();
            const token = document.getElementById('ghToken').value.trim();
            localStorage.setItem('gh_repo', repo);
            localStorage.setItem('gh_token', token);
            alert("✅ GitHub API Credentials Saved!");
            document.getElementById('githubConfigBlock').classList.add('hidden');
        }

        function loadSavedGithubConfig() {
            document.getElementById('ghRepo').value = localStorage.getItem('gh_repo') || '';
            document.getElementById('ghToken').value = localStorage.getItem('gh_token') || '';
        }

        function autoGenerateSlug() {
            const title = document.getElementById('jobTitle').value;
            let slug = title.toLowerCase()
                .replace(/[^a-z0-9]/g, '-')
                .replace(/-+/g, '-')
                .replace(/^-|-$/g, '');
            if(!slug) slug = 'post-' + Date.now();
            document.getElementById('fileSlug').value = slug + '.html';
        }

        function showStatus(msg, isError = false) {
            const log = document.getElementById('statusLog');
            log.className = `mb-4 p-3 rounded-xl text-xs font-bold ${isError ? 'bg-rose-500/20 text-rose-300 border border-rose-500/30' : 'bg-emerald-500/20 text-emerald-300 border border-emerald-500/30'}`;
            log.innerText = msg;
            log.classList.remove('hidden');
        }

        async function publishAutoPost() {
            const repo = document.getElementById('ghRepo').value.trim();
            const token = document.getElementById('ghToken').value.trim();
            
            const category = document.getElementById('jobCategory').value;
            const tag = document.getElementById('jobTag').value.trim();
            const title = document.getElementById('jobTitle').value.trim();
            const meta = document.getElementById('jobMeta').value.trim();
            let slug = document.getElementById('fileSlug').value.trim();
            const htmlCode = document.getElementById('postHtmlCode').value.trim();
            
            const editingPostId = document.getElementById('editingPostId').value;
            const oldCategory = document.getElementById('editingCategory').value;

            if(!title) { alert("❌ Title is required!"); return; }

            let finalLink = slug;

            // Upload HTML page directly to GitHub if code is pasted
            if (htmlCode) {
                if(!repo || !token) {
                    alert("⚠️ GitHub Repo or Access Token missing! Please click '⚙️ GitHub API Settings' at top right and save credentials.");
                    toggleGithubConfig();
                    return;
                }
                
                if(!slug.endsWith('.html')) slug += '.html';
                finalLink = slug;

                showStatus("⏳ 1/2. Uploading HTML Page directly to GitHub Repository...");

                try {
                    const apiUrl = `https://api.github.com/repos/${repo}/contents/${slug}`;
                    let sha = "";
                    
                    const getRes = await fetch(apiUrl, { headers: { 'Authorization': `token ${token}` } });
                    if(getRes.ok) {
                        const getData = await getRes.json();
                        sha = getData.sha;
                    }

                    const uploadRes = await fetch(apiUrl, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Auto-publish post: ${slug}`,
                            content: btoa(unescape(encodeURIComponent(htmlCode))),
                            sha: sha || undefined
                        })
                    });

                    if(!uploadRes.ok) {
                        throw new Error("GitHub Upload Failed! Check Token & Repo Name.");
                    }
                } catch(err) {
                    console.error(err);
                    showStatus(`❌ GitHub Error: ${err.message}`, true);
                    return;
                }
            }

            showStatus("⏳ 2/2. Syncing Post details to Live Firebase Feed...");

            const postObj = { tag, title, meta, link: finalLink, timestamp: Date.now() };

            if(editingPostId) {
                if (oldCategory !== category) {
                    database.ref('posts/' + oldCategory + '/' + editingPostId).remove();
                    database.ref('posts/' + category).push().set(postObj);
                } else {
                    database.ref('posts/' + category + '/' + editingPostId).update({ tag, title, meta, link: finalLink });
                }
                showStatus("✅ Success! Post Updated Live!");
                cancelEditing(); 
                loadCategoryPosts();
            } else {
                database.ref('posts/' + category).push().set(postObj).then(() => {
                    showStatus(`🎉 SUCCESS! Post is LIVE on Gujarat Fast Alert!`);
                    clearForm();
                });
            }
        }

        function loadCategoryPosts() {
            const category = document.getElementById('manageCategory').value;
            const listDiv = document.getElementById('postsList');
            listDiv.innerHTML = '<p class="text-xs text-slate-500 p-3 text-center">Syncing live cloud database...</p>';
            database.ref('posts/' + category).once('value', (snapshot) => {
                listDiv.innerHTML = '';
                const data = snapshot.val();
                if(!data) { listDiv.innerHTML = '<p class="text-xs text-slate-500 p-4 text-center">No active posts found in this category.</p>'; return; }
                Object.keys(data).reverse().forEach(key => {
                    const post = data[key];
                    const item = document.createElement('div');
                    item.className = 'bg-slate-800/80 p-3 rounded-xl border border-slate-700 flex flex-col sm:flex-row sm:items-center justify-between gap-2';
                    item.innerHTML = `
                        <div class="text-xs font-bold text-slate-200 pr-2">${post.title} <span class="text-[10px] text-amber-400 font-normal">(${post.link})</span></div>
                        <div class="flex items-center gap-1.5 shrink-0 self-end sm:self-center">
                            <button class="px-3 py-1.5 bg-amber-500/20 text-amber-300 rounded-lg font-bold text-[10px] hover:bg-amber-500/30 transition" onclick="startEditing('${key}', '${category}', ${JSON.stringify(post).replace(/"/g, '&quot;')})">✏️ Edit</button>
                            <button class="px-3 py-1.5 bg-rose-500/20 text-rose-300 rounded-lg font-bold text-[10px] hover:bg-rose-500/30 transition" onclick="deletePost('${key}', '${category}')">🗑️ Delete</button>
                        </div>`;
                    listDiv.appendChild(item);
                });
            });
        }

        function startEditing(id, category, post) {
            document.getElementById('editingPostId').value = id;
            document.getElementById('editingCategory').value = category;
            document.getElementById('jobCategory').value = category;
            document.getElementById('jobTag').value = post.tag || '';
            document.getElementById('jobTitle').value = post.title || '';
            document.getElementById('jobMeta').value = post.meta || '';
            document.getElementById('fileSlug').value = post.link || '';
            document.getElementById('form-action-title').innerText = "✏️ Editing Live Post Model";
            document.getElementById('submitBtn').innerText = "💾 SAVE CHANGES LIVE";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            switchTab('post-tab');
        }

        function cancelEditing() {
            document.getElementById('editingPostId').value = '';
            document.getElementById('editingCategory').value = ''; 
            clearForm();
            document.getElementById('form-action-title').innerText = "🔥 Create & Publish Live Post";
            document.getElementById('submitBtn').innerText = "🔥 PUBLISH & SYNC TO GUJARATFASTALERT.IN";
            document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        function deletePost(id, category) {
            if(confirm("Are you sure you want to delete this live post?")) {
                database.ref('posts/' + category + '/' + id).remove().then(() => { loadCategoryPosts(); });
            }
        }

        function saveGlobalSettings() {
            database.ref('settings').set({
                headerNotice: document.getElementById('headerNotice').value,
                siteTitle: document.getElementById('siteTitleSetting').value
            }).then(() => { alert("Global website settings updated!"); });
        }

        function loadGlobalSettings() {
            database.ref('settings').once('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('headerNotice').value = data.headerNotice || '';
                    document.getElementById('siteTitleSetting').value = data.siteTitle || '';
                }
            });
        }

        function clearForm() {
            document.getElementById('jobTitle').value = ''; 
            document.getElementById('jobMeta').value = '';
            document.getElementById('fileSlug').value = ''; 
            document.getElementById('jobTag').value = '';
            document.getElementById('postHtmlCode').value = '';
        }

        function updatePreviewFromCode() {
            const code = document.getElementById('postHtmlCode').value;
            const iframe = document.getElementById('htmlPreviewFrame');
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            doc.open(); doc.write(code); doc.close();
        }
    </script>
</body>
</html>
