<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gujarat Fast Alert - Pro Admin Panel</title>
    
    <!-- Google Fonts & Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { background-color: #f4f7fa; font-family: system-ui, -apple-system, sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        /* Custom styling for active tab button */
        .tab-btn.active {
            background-color: #2b5797;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex items-center justify-center p-4 md:p-6">

    <!-- 🔒 SECURITY LOCK SCREEN -->
    <div id="pinScreen" class="w-full max-w-md bg-white p-6 md:p-8 rounded-2xl shadow-xl border border-slate-100 text-center transition-all">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 text-blue-600 rounded-full text-2xl mb-4">
            🔒
        </div>
        <h2 class="text-xl md:text-2xl font-black text-slate-900 tracking-tight">Vanraj Security Lock</h2>
        <p class="text-xs text-slate-500 mt-1 mb-6">કંટ્રોલ પેનલ ઓપન કરવા માટે 7-અંકનો સિક્યોરિટી PIN દાખલ કરો:</p>
        
        <input type="password" inputmode="numeric" pattern="[0-9]*" id="adminPinInput" maxlength="7" placeholder="•••••••" 
            class="w-full text-center text-3xl tracking-[12px] font-extrabold py-3 bg-slate-50 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-blue-600 focus:bg-white transition-all mb-4">
        
        <button onclick="checkAdminPin()" 
            class="w-full py-3.5 bg-gradient-to-r from-[#2b5797] to-blue-700 text-white font-bold rounded-xl shadow-md shadow-blue-200 hover:opacity-95 active:scale-[0.99] transition-all text-sm uppercase tracking-wider">
            🔓 Unlock Control Panel
        </button>
    </div>

    <!-- 🚀 MAIN DASHBOARD BOX -->
    <div id="mainAdminBox" class="w-full max-w-xl bg-white rounded-2xl shadow-2xl border border-slate-100 p-5 md:p-6 transition-all hidden">
        
        <!-- Header Profile -->
        <div class="flex items-center gap-3 border-b border-slate-100 pb-4 mb-5">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-orange-500 to-amber-600 flex items-center justify-center text-white text-lg font-bold shadow-md shadow-orange-100">
                👑
            </div>
            <div>
                <h2 class="text-md font-black text-slate-900 leading-tight">Vanrajsinh Full-Access</h2>
                <p class="text-[10px] text-green-600 font-bold flex items-center gap-1 mt-0.5">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Live Sync Dashboard
                </p>
            </div>
        </div>

        <!-- Modern Micro Tabs Grid -->
        <div class="grid grid-cols-4 gap-1.5 p-1 bg-slate-100 rounded-xl mb-6">
            <button class="tab-btn active text-[11px] md:text-xs font-bold py-2.5 rounded-lg text-slate-600 transition-all text-center" onclick="switchTab('post-tab')">📝 POST</button>
            <button class="tab-btn text-[11px] md:text-xs font-bold py-2.5 rounded-lg text-slate-600 transition-all text-center" onclick="switchTab('manage-tab')">⚙️ MANAGE</button>
            <button class="tab-btn text-[11px] md:text-xs font-bold py-2.5 rounded-lg text-slate-600 transition-all text-center" onclick="switchTab('settings-tab')">📢 CONFIG</button>
            <button class="tab-btn text-[11px] md:text-xs font-bold py-2.5 rounded-lg text-slate-600 transition-all text-center" onclick="switchTab('editor-tab')">💻 EDITOR</button>
        </div>

        <!-- 1. POST TAB -->
        <div id="post-tab" class="tab-content active space-y-4">
            <div class="bg-blue-50/70 border-l-4 border-blue-600 p-3 rounded-r-xl">
                <h3 id="form-action-title" class="text-xs font-black text-blue-950 uppercase tracking-wider">Add New Live Update</h3>
            </div>
            
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">1. Select Feed Location / Menu Grid:</label>
                <select id="jobCategory" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold focus:outline-none focus:ring-2 focus:ring-orange-500 focus:bg-white transition-all">
                    <optgroup label="📝 Main Scroll Lists (નીચેની લાંબી યાદી)">
                        <option value="latest-jobs-list">🔥 લેટેસ્ટ સરકારી નોકરીઓ (List View)</option>
                        <option value="articles-list">📰 લેટેસ્ટ માહિતી અને આર્ટિકલ્સ (List View)</option>
                    </optgroup>
                    <optgroup label="🎓 શિક્ષણ અને સરકારી નોકરી Grid">
                        <option value="govt-jobs">💼 Govt Jobs</option>
                        <option value="syllabus">📋 Syllabus</option>
                        <option value="answer-key">🔑 Answer Key</option>
                        <option value="result">🏆 Result</option>
                        <option value="admit-card">🎟️ Admit Card</option>
                        <option value="prev-papers">📄 Prev. Papers</option>
                        <option value="scholarship">🎓 Scholarship</option>
                        <option value="edu-news">📰 Edu News</option>
                    </optgroup>
                    <optgroup label="🏛️ યોજના અને સમાચાર Grid">
                        <option value="govt-schemes">🏛️ સરકારી યોજના</option>
                        <option value="current-affairs">📅 Current Affairs</option>
                        <option value="gujarati-news">🗣️ Gujarati News</option>
                    </optgroup>
                    <optgroup label="🧮 ગાઈડ અને કેલ્ક્યુલેટર Grid">
                        <option value="howto-guides">ℹ️ How-to Guides</option>
                        <option value="calculators">🧮 Calculators</option>
                        <option value="finance-tax">💰 Finance & Tax</option>
                    </optgroup>
                    <optgroup label="💡 ઓનલાઈન બિલ પેમેન્ટ Grid">
                        <option value="ugvcl-bill">💡 UGVCL Bill</option>
                        <option value="gujarat-gas">🔥 Gujarat Gas</option>
                        <option value="pgvcl-bill">⚡ PGVCL Bill</option>
                        <option value="mgvcl-bill">🔌 MGVCL Bill</option>
                    </optgroup>
                    <optgroup label="🍿 મનોરંજન અને ટેકનોલોજી Grid">
                        <option value="tech-news">🤖 Tech News</option>
                        <option value="movie-ott">🍿 Movie & OTT</option>
                        <option value="web-series">🎬 Web Series</option>
                        <option value="auto-news">🚗 Auto News</option>
                        <option value="cricket-ipl">🏏 Cricket / IPL</option>
                        <option value="health-tips">🍏 Health Tips</option>
                        <option value="wishes-quotes">🎉 Wishes & Quotes</option>
                    </optgroup>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">2. Badge Text (e.g. GSSSB, GPSC, LRD, NEW):</label>
                <input type="text" id="jobTag" placeholder="GSSSB, GPSC ya NEW..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-medium focus:outline-none focus:ring-2 focus:ring-orange-500 focus:bg-white transition-all">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">3. Post Main Title Text (Gujarati/English):</label>
                <input type="text" id="jobTitle" placeholder="Bharti / Notice nu નામ લખો..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-medium focus:outline-none focus:ring-2 focus:ring-orange-500 focus:bg-white transition-all">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">4. Sub-Text / Last Date / Alert Info:</label>
                <input type="text" id="jobMeta" placeholder="Last Date: 21-07-2026 ya Click Here" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-medium focus:outline-none focus:ring-2 focus:ring-orange-500 focus:bg-white transition-all">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">5. Destination Target URL (GitHub HTML Page Link):</label>
                <input type="url" id="jobLink" placeholder="https://gujaratfastalert.in/..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-medium focus:outline-none focus:ring-2 focus:ring-orange-500 focus:bg-white transition-all">
            </div>

            <input type="hidden" id="editingPostId" value="">
            <input type="hidden" id="editingCategory" value="">

            <div class="pt-2">
                <button id="submitBtn" onclick="publishPost()" class="w-full py-3.5 bg-gradient-to-r from-orange-500 to-amber-600 text-white font-bold rounded-xl shadow-lg shadow-orange-100 hover:opacity-95 transition-all text-xs uppercase tracking-wider">
                    🔥 Push Live to Gujaratfastalert.in
                </button>
                <button id="cancelEditBtn" onclick="cancelEditing()" class="w-full py-2.5 bg-rose-500 text-white font-bold rounded-xl hover:bg-rose-600 transition-all text-xs uppercase tracking-wider mt-2 hidden">
                    Cancel Edit Mode
                </button>
            </div>
        </div>

        <!-- 2. MANAGE TAB -->
        <div id="manage-tab" class="tab-content space-y-4">
            <div class="bg-blue-50/70 border-l-4 border-blue-600 p-3 rounded-r-xl mb-4">
                <h3 class="text-xs font-black text-blue-950 uppercase tracking-wider">Edit / Delete Live Posts</h3>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">Select Category to view posts:</label>
                <select id="manageCategory" onchange="loadCategoryPosts()" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold focus:outline-none focus:ring-2 focus:ring-[#2b5797] focus:bg-white transition-all">
                    <option value="latest-jobs-list">🔥 લેટેસ્ટ સરકારી નોકરીઓ</option>
                    <option value="articles-list">📰 લેટેસ્ટ માહિતી અને આર્ટિકલ્સ</option>
                    <option value="govt-jobs">💼 Govt Jobs</option>
                    <option value="syllabus">📋 Syllabus</option>
                    <option value="answer-key">🔑 Answer Key</option>
                    <option value="result">🏆 Result</option>
                    <option value="admit-card">🎟️ Admit Card</option>
                    <option value="prev-papers">📄 Prev. Papers</option>
                    <option value="scholarship">🎓 Scholarship</option>
                    <option value="edu-news">📰 Edu News</option>
                </select>
            </div>
            
            <div class="border border-slate-100 bg-slate-50 rounded-xl p-2 max-h-[320px] overflow-y-auto space-y-2 mt-2" id="postsList"></div>
        </div>

        <!-- 3. SETTINGS TAB -->
        <div id="settings-tab" class="tab-content space-y-4">
            <div class="bg-blue-50/70 border-l-4 border-blue-600 p-3 rounded-r-xl">
                <h3 class="text-xs font-black text-blue-950 uppercase tracking-wider">Website Global Settings</h3>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">📢 Header Marquee Ticker (Top Running Alert text):</label>
                <textarea id="headerNotice" rows="3" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-medium focus:outline-none focus:ring-2 focus:ring-blue-600 focus:bg-white transition-all resize-none"></textarea>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">🌐 Website Global Title Name:</label>
                <input type="text" id="siteTitleSetting" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-medium focus:outline-none focus:ring-2 focus:ring-blue-600 focus:bg-white transition-all">
            </div>
            <button onclick="saveGlobalSettings()" class="w-full py-3.5 bg-gradient-to-r from-[#2b5797] to-blue-700 text-white font-bold rounded-xl shadow-lg shadow-blue-100 hover:opacity-95 transition-all text-xs uppercase tracking-wider pt-2">
                💾 Save Website Settings
            </button>
        </div>

        <!-- 4. EDITOR TAB -->
        <div id="editor-tab" class="tab-content space-y-4">
            <div class="bg-blue-50/70 border-l-4 border-blue-600 p-3 rounded-r-xl">
                <h3 class="text-xs font-black text-blue-950 uppercase tracking-wider">💻 Premium HTML Page Editor</h3>
            </div>
            <textarea id="htmlCodeInput" rows="10" oninput="updateHtmlPreview()" class="w-full p-3 font-mono text-[11px] bg-slate-900 text-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 transition-all"></textarea>
            <button onclick="copyHtmlCode()" class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl shadow-md transition-all text-xs uppercase tracking-wider">
                📋 Copy Updated HTML Code
            </button>
            <div class="text-[10px] font-bold text-slate-400 mt-2">Live Canvas Preview:</div>
            <iframe id="htmlPreviewFrame" class="w-full min-h-[180px] border-2 border-dashed border-slate-200 rounded-xl bg-white"></iframe>
        </div>
    </div>

    <!-- FIREBASE AND CORE INTERACTIVE SCRIPTS -->
    <script>
        const MY_SECRET_PIN = "1465822"; 

        const firebaseConfig = {
            apiKey: "AIzaSyD40GV9eAeGiu-Tz0l09ZLifjzAQp3UFso",
            authDomain: "gujarat-fast-alert.firebaseapp.com",
            databaseURL: "https://gujarat-fast-alert-default-rtdb.firebaseio.com",
            projectId: "gujarat-fast-alert",
            storageBucket: "gujarat-fast-alert.firebasestorage.app",
            messagingSenderId: "395130500748",
            appId: "1:395130500748:web:e6589f3a57812efad6ada9",
            measurementId: "G-ZJN134J7EC"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function checkAdminPin() {
            if(document.getElementById('adminPinInput').value === MY_SECRET_PIN) {
                document.getElementById('pinScreen').style.display = 'none';
                document.getElementById('mainAdminBox').style.classList.remove('hidden');
                loadGlobalSettings(); loadCategoryPosts();
            } else {
                alert("❌ Invalid Pin Security Authorization!");
                document.getElementById('adminPinInput').value = '';
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(event) event.currentTarget.classList.add('active');
        }

        function publishPost() {
            const category = document.getElementById('jobCategory').value;
            const tag = document.getElementById('jobTag').value;
            const title = document.getElementById('jobTitle').value;
            const meta = document.getElementById('jobMeta').value;
            const link = document.getElementById('jobLink').value;
            const editingPostId = document.getElementById('editingPostId').value;
            const oldCategory = document.getElementById('editingCategory').value;

            if(!title || !link) { alert("Error: Title and Link are mandatory fields!"); return; }

            if(editingPostId) {
                if (oldCategory !== category) {
                    database.ref('posts/' + oldCategory + '/' + editingPostId).remove();
                    database.ref('posts/' + category).push().set({ tag, title, meta, link, timestamp: Date.now() });
                } else {
                    database.ref('posts/' + category + '/' + editingPostId).update({ tag, title, meta, link });
                }
                alert("Post successfully Updated! 🎉"); cancelEditing(); loadCategoryPosts();
            } else {
                database.ref('posts/' + category).push().set({ tag, title, meta, link, timestamp: Date.now() }).then(() => {
                    alert("Post is now LIVE instantly! 🎉"); clearForm();
                });
            }
        }

        function loadCategoryPosts() {
            const category = document.getElementById('manageCategory').value;
            const listDiv = document.getElementById('postsList');
            listDiv.innerHTML = '<p class="text-xs text-slate-400 p-3 text-center">Syncing live cloud storage...</p>';
            database.ref('posts/' + category).once('value', (snapshot) => {
                listDiv.innerHTML = '';
                const data = snapshot.val();
                if(!data) { listDiv.innerHTML = '<p class="text-xs text-slate-400 p-4 text-center">No active posts found here.</p>'; return; }
                Object.keys(data).reverse().forEach(key => {
                    const post = data[key];
                    const item = document.createElement('div');
                    item.className = 'bg-white p-3 rounded-xl border border-slate-100 flex flex-col sm:flex-row sm:items-center justify-between gap-2 shadow-sm';
                    item.innerHTML = `
                        <div class="text-xs font-bold text-slate-700 pr-2">${post.title}</div>
                        <div class="flex items-center gap-1.5 shrink-0 self-end sm:self-center">
                            <button class="px-3 py-1.5 bg-blue-50 text-blue-600 rounded-lg font-bold text-[10px] hover:bg-blue-100 transition" onclick="startEditing('${key}', '${category}', ${JSON.stringify(post).replace(/"/g, '&quot;')})">✏️ Edit</button>
                            <button class="px-3 py-1.5 bg-rose-50 text-rose-600 rounded-lg font-bold text-[10px] hover:bg-rose-100 transition" onclick="deletePost('${key}', '${category}')">🗑️ Delete</button>
                        </div>`;
                    listDiv.appendChild(item);
                });
            });
        }

        function startEditing(id, category, post) {
            document.getElementById('editingPostId').value = id;
            document.getElementById('editingCategory').value = category;
            document.getElementById('jobCategory').value = category;
            document.getElementById('jobTag').value = post.tag || '';
            document.getElementById('jobTitle').value = post.title || '';
            document.getElementById('jobMeta').value = post.meta || '';
            document.getElementById('jobLink').value = post.link || '';
            document.getElementById('form-action-title').innerText = "✏️ Editing Live Post Model";
            document.getElementById('submitBtn').innerText = "💾 Save Changes Live";
            document.getElementById('submitBtn').className = "w-full py-3.5 bg-gradient-to-r from-blue-600 to-[#2b5797] text-white font-bold rounded-xl shadow-lg shadow-blue-100 hover:opacity-95 transition-all text-xs uppercase tracking-wider";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            switchTab('post-tab');
        }

        function cancelEditing() {
            document.getElementById('editingPostId').value = '';
            document.getElementById('editingCategory').value = ''; clearForm();
            document.getElementById('form-action-title').innerText = "Add New Live Update";
            document.getElementById('submitBtn').innerText = "🔥 Push Live to Gujaratfastalert.in";
            document.getElementById('submitBtn').className = "w-full py-3.5 bg-gradient-to-r from-orange-500 to-amber-600 text-white font-bold rounded-xl shadow-lg shadow-orange-100 hover:opacity-95 transition-all text-xs uppercase tracking-wider";
            document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        function deletePost(id, category) {
            if(confirm("Are you sure you want to delete this live element?")) {
                database.ref('posts/' + category + '/' + id).remove().then(() => { loadCategoryPosts(); });
            }
        }

        function saveGlobalSettings() {
            database.ref('settings').set({
                headerNotice: document.getElementById('headerNotice').value,
                siteTitle: document.getElementById('siteTitleSetting').value
            }).then(() => { alert("Global website config nodes synced! 👍"); });
        }

        function loadGlobalSettings() {
            database.ref('settings').once('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('headerNotice').value = data.headerNotice || '';
                    document.getElementById('siteTitleSetting').value = data.siteTitle || '';
                }
            });
        }

        function clearForm() {
            document.getElementById('jobTitle').value = ''; document.getElementById('jobMeta').value = '';
            document.getElementById('jobLink').value = ''; document.getElementById('jobTag').value = '';
        }

        function updateHtmlPreview() {
            const code = document.getElementById('htmlCodeInput').value;
            const iframe = document.getElementById('htmlPreviewFrame');
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            doc.open(); doc.write(code); doc.close();
        }

        function copyHtmlCode() {
            const textarea = document.getElementById('htmlCodeInput');
            textarea.select(); document.execCommand('copy');
            alert("HTML code copied to clipboard! 📋");
        }
    </script>
</body>
</html>
