<body class="text-slate-800 min-h-screen flex flex-col items-center pb-12">

    <!-- Top Navigation Header -->

        <div class="max-w-lg mx-auto flex justify-between items-center">
            <a href="./index.html" class="flex items-center gap-1.5 text-xs font-bold bg-slate-800 hover:bg-slate-700 text-orange-400 px-3 py-1.5 rounded-lg border border-slate-700 transition">
                ⬅ હોમ પેજ (Home)
            </a>
            <span class="text-xs font-extrabold tracking-wider text-slate-300">GUJARAT FAST ALERT</span>
        </div>
    </div>

    <!-- Category Header Card -->
    <div class="w-full max-w-lg px-4 mt-6">
        <div class="bg-gradient-to-r from-orange-500 via-amber-500 to-orange-600 text-white p-5 rounded-2xl shadow-md text-center">
            <h1 id="catHeaderTitle" class="text-xl md:text-2xl font-extrabold tracking-tight">Loading Updates...</h1>
            <p class="text-xs font-semibold opacity-90 mt-1">ગુજરાત ફાસ્ટ એલર્ટ - તમામ તાજેતરની માહિતી</p>
        </div>
    </div>

    <!-- Main Content Container -->
    <div class="w-full max-w-lg px-4 mt-6">
        <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
            <div id="category-posts-list" class="divide-y divide-slate-100 text-sm font-bold text-slate-800">
                <div class="p-8 text-center text-slate-400 font-semibold">અપડેટ્સ લોડ થઈ રહ્યા છે...</div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="w-full bg-slate-900 text-slate-400 py-8 px-6 text-xs text-center border-t border-slate-800 mt-12">
        <p class="font-extrabold text-slate-200 mb-1.5">© 2026-27, Vanrajsinh Vaghela ®</p>
        <p class="opacity-75 max-w-md mx-auto mb-4">Gujarat Fast Alert - Gujarat's No. 01 Educational News Portal</p>
        <a href="./index.html" class="text-orange-400 font-bold hover:underline">← પાછા હોમ પેજ પર જાઓ</a>
    </footer>

    <!-- Firebase Logic -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD40GV9eAeGiu-Tz0l09ZLifjzAQp3UFso",
            authDomain: "gujarat-fast-alert.firebaseapp.com",
            databaseURL: "https://gujarat-fast-alert-default-rtdb.firebaseio.com",
            projectId: "gujarat-fast-alert",
            storageBucket: "gujarat-fast-alert.firebasestorage.app",
            messagingSenderId: "395130500748",
            appId: "1:395130500748:web:e6589f3a57812efad6ada9",
            measurementId: "G-ZJN134J7EC"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Get Category from URL
        const urlParams = new URLSearchParams(window.location.search);
        const categorySlug = urlParams.get('c') || 'latest-jobs-list';

        const categoryTitles = {
            'govt-jobs': '💼 સરકારી નોકરીઓ (Govt Jobs)',
            'syllabus': '📋 સિલેબસ (Syllabus)',
            'answer-key': '🔑 આન્સર કી (Answer Key)',
            'result': '🏆 રીઝલ્ટ (Result)',
            'admit-card': '🎟️ કૉલ લેટર (Admit Card)',
            'prev-papers': '📄 જૂના પેપર્સ (Prev. Papers)',
            'scholarship': '🎓 સ્કોલરશીપ (Scholarship)',
            'edu-news': '📰 શૈક્ષણિક સમાચાર (Edu News)',
            'govt-schemes': '🏛️ સરકારી યોજનાઓ',
            'current-affairs': '📅 કરંટ અફેર્સ',
            'gujarati-news': '🗣️ ગુજરાત ન્યૂઝ',
            'howto-guides': 'ℹ️ હાઉ-ટુ ગાઈડ્સ',
            'calculators': '🧮 કેલ્ક્યુલેટર્સ',
            'finance-tax': '💰 ફાઈનાન્સ અને ટેક્સ',
            'ugvcl-bill': '💡 UGVCL બિલ પેમેન્ટ',
            'gujarat-gas': '🔥 ગુજરાત ગેસ પેમેન્ટ',
            'pgvcl-bill': '⚡ PGVCL બિલ પેમેન્ટ',
            'mgvcl-bill': '🔌 MGVCL બિલ પેમેન્ટ',
            'tech-news': '🤖 ટેકનોલોજી ન્યૂઝ',
            'movie-ott': '🍿 મૂવી અને OTT',
            'web-series': '🎬 વેબ સિરીઝ',
            'auto-news': '🚗 ઓટોમોબાઈલ ન્યૂઝ',
            'cricket-ipl': '🏏 ક્રિકેટ સમાચાર',
            'health-tips': '🍏 હેલ્થ ટિપ્સ',
            'wishes-quotes': '🎉 શુભકામનાઓ અને સુવિચાર',
            'schemes-list': '🔗 ડાયરેક્ટ ઓનલાઈન સેવાઓ અને યોજનાઓ',
            'news-list': '📰 તાજા સમાચાર અને મહત્વની અપડેટ્સ',
            'latest-jobs-list': '🔥 લેટેસ્ટ સરકારી નોકરીઓ (OJAS / GPSC)',
            'articles-list': '📰 લેટેસ્ટ માહિતી અને આર્ટિકલ્સ'
        };

        function fixLink(link) {
            if (!link || link === '#') return '#';
            let l = link.trim();
            if (l.startsWith('http://') || l.startsWith('https://') || l.startsWith('./') || l.startsWith('/')) {
                return l;
            }
            if (l.startsWith('gujaratfastalert.in')) {
                let cleaned = l.replace(/^gujaratfastalert\.in\.?\/?/, 'gujaratfastalert.in/');
                return 'https://' + cleaned;
            }
            return './' + l;
        }

        function loadCategoryPosts() {
            const displayTitle = categoryTitles[categorySlug] || 'માહિતી અને અપડેટ્સ';
            document.getElementById('catHeaderTitle').innerText = displayTitle;
            document.getElementById('pageTitle').innerText = displayTitle + ' - Gujarat Fast Alert';

            database.ref('posts/' + categorySlug).on('value', (snapshot) => {
                const postsObj = snapshot.val();
                const container = document.getElementById('category-posts-list');
                container.innerHTML = '';

                if (!postsObj) {
                    container.innerHTML = `
                        <div class="p-8 text-center text-slate-500 font-semibold">
                            અત્યારે આ કેટેગરીમાં કોઈ માહિતી ઉપલબ્ધ નથી.<br>
                            <a href="./index.html" class="inline-block mt-3 text-xs bg-orange-500 text-white px-4 py-2 rounded-lg font-bold">← હોમ પેજ પર પાછા જાઓ</a>
                        </div>`;
                    return;
                }

                const posts = Object.keys(postsObj).map(key => postsObj[key]).reverse();

                posts.forEach((post) => {
                    container.innerHTML += `
                        <a href="${fixLink(post.link)}" target="_blank" class="p-4 flex justify-between items-center hover:bg-orange-50/50 transition text-slate-800 hover:text-blue-700 border-b border-slate-100 last:border-none w-full group">
                            <div class="pr-3 leading-snug flex items-start gap-2.5 font-extrabold text-sm md:text-base">
                                <span class="text-orange-500 shrink-0 mt-0.5">📌</span>
                                <span class="group-hover:translate-x-0.5 transition-transform">${post.title}</span>
                            </div>
                            <span class="text-[10px] bg-orange-100 text-orange-800 px-2.5 py-1 rounded-full font-extrabold shrink-0 tracking-wider shadow-sm ml-2">${post.tag || 'ALERT'}</span>
                        </a>`;
                });
            });
        }

        window.onload = loadCategoryPosts;
    </script>
</body>
</html>
